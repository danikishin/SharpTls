version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      test-and-tooling:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
